services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - idm_net

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      - mysql
    command: start --http-enabled=true --hostname-strict=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak-theme:/opt/keycloak/themes:ro
    networks:
      - idm_net

  agents-panel:
    build:
      context: ./agents-panel
    image: agents-panel:latest
    container_name: agents-panel
    restart: unless-stopped
    depends_on:
      - mysql
      - keycloak
    environment:
      PUBLIC_URL: auto
      HTTPS_PORT: 3443
      TLS_CERT_PATH: /app/certs/agents-panel.crt
      TLS_KEY_PATH: /app/certs/agents-panel.key
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: auto
      KEYCLOAK_PUBLIC_PROTOCOL: http
      KEYCLOAK_PUBLIC_PORT: 8080
      KEYCLOAK_REALM: agents-panel
      KEYCLOAK_CLIENT_ID: agents-panel-web
      KEYCLOAK_CLIENT_SECRET: ${PANEL_WEB_CLIENT_SECRET}
      KEYCLOAK_ADMIN_CLIENT_ID: agents-panel-admin
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${PANEL_ADMIN_CLIENT_SECRET}
      DB_HOST: mysql
      DB_NAME: agents_panel
      DB_USER: agents_panel
      DB_PASSWORD: ${PANEL_DB_PASSWORD}
      APP_SECRET: ${PANEL_APP_SECRET}
      SESSION_SECRET: ${PANEL_SESSION_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL}
      AGENT_IMAGE_DIR: /app/data/agent-images
      ANAM_API_KEY: ${ANAM_API_KEY}
      ANAM_API_URL: ${ANAM_API_URL}
      ANAM_PUBLIC_API_URL: ${ANAM_PUBLIC_API_URL}
      SUPPORT_ELEVENLABS_API_KEY: ${SUPPORT_ELEVENLABS_API_KEY}
      SUPPORT_PERSONA_1_NAME: ${SUPPORT_PERSONA_1_NAME}
      SUPPORT_PERSONA_1_AVATAR_ID: ${SUPPORT_PERSONA_1_AVATAR_ID}
      SUPPORT_PERSONA_1_AGENT_ID: ${SUPPORT_PERSONA_1_AGENT_ID}
      SUPPORT_PERSONA_2_NAME: ${SUPPORT_PERSONA_2_NAME}
      SUPPORT_PERSONA_2_AVATAR_ID: ${SUPPORT_PERSONA_2_AVATAR_ID}
      SUPPORT_PERSONA_2_AGENT_ID: ${SUPPORT_PERSONA_2_AGENT_ID}
    ports:
      - "3000:3000"
      - "3443:3443"
    volumes:
      - agents_panel_data:/app/data
      - ./certs:/app/certs:ro
    networks:
      - idm_net

  meet-browser-sofia:
    build:
      context: ./meet-browser
    image: meet-browser:latest
    container_name: meet-browser-sofia
    restart: unless-stopped
    ports:
      - "7900:7900"
      - "9223:9223"
    volumes:
      - meet_browser_sofia_data:/data
    networks:
      - idm_net

  meet-bridge-sofia:
    build:
      context: ./meet-bridge
    image: meet-bridge:latest
    container_name: meet-bridge-sofia
    restart: unless-stopped
    depends_on:
      - meet-browser-sofia
    environment:
      PORT: 3200
      MEET_AGENT_DISPLAY_NAME: ${MEET_AGENT_DISPLAY_NAME}
      MEET_DEFAULT_URL: ${MEET_DEFAULT_URL}
      MEET_BROWSER_NOVNC_PORT: 7900
      MEET_BROWSER_DEBUG_URL: http://meet-browser-sofia:9223
      ANAM_API_KEY: ${ANAM_API_KEY}
      ANAM_API_URL: ${ANAM_API_URL}
      SUPPORT_ELEVENLABS_API_KEY: ${SUPPORT_ELEVENLABS_API_KEY}
      SUPPORT_PERSONA_2_AVATAR_ID: ${SUPPORT_PERSONA_2_AVATAR_ID}
      SUPPORT_PERSONA_2_AGENT_ID: ${SUPPORT_PERSONA_2_AGENT_ID}
      MEET_ANAM_AVATAR_ID: ${MEET_ANAM_AVATAR_ID:-}
      MEET_ELEVENLABS_AGENT_ID: ${MEET_ELEVENLABS_AGENT_ID:-}
    ports:
      - "3200:3200"
    networks:
      - idm_net

networks:
  idm_net:
    external: true
    name: idm_net

volumes:
  mysql_data:
    name: mysql_data
  agents_panel_data:
  meet_browser_sofia_data:
